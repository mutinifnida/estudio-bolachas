<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Estúdio Bolachas</title>

    <!-- PRÉ LOADS DE IMAGEM -->
    <link rel="preload" as="image" href="assets/svg/bolachinha-entry.svg" />
    <link rel="preload" as="image" href="assets/svg/bolachinha-entry-b.svg" />
    <link rel="preload" as="image" href="assets/svg/bolachinha.svg" />
    <link rel="preload" as="image" href="assets/svg/bolachinha-b.svg" />

    <link rel="preload" as="image" href="assets/svg/roseta-amarela.svg" />
    <link rel="preload" as="image" href="assets/svg/roseta-vermelha.svg" />

    <link rel="preload" as="image" href="assets/svg/txt-rodape.svg" />
    <link rel="preload" as="image" href="assets/svg/txt-rodape-mob.svg" />
    <link rel="preload" as="image" href="assets/svg/barcode-vert.svg" />
    <link rel="preload" as="image" href="assets/svg/barcode-hori.svg" />

    <link rel="preload" as="image" href="assets/svg/bolachas-header.svg" />
    <link rel="preload" as="image" href="assets/svg/bolachas-header-b.svg" />
    <link rel="preload" as="image" href="assets/svg/bolachas-header-mob.svg" />
    <link rel="preload" as="image" href="assets/svg/bolachas-header-mob-b.svg" />
    <!-- FIM DOS PRÉ LOADS -->

    <link rel="icon" type="image/svg+xml" href="assets/img/thumb-bolachas/thumb-bolachas.svg" />
    <link rel="icon" type="image/png" href="assets/img/thumb-bolachas/thumb-bolachas.png" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Estúdio Bolachas" />
    <meta
      property="og:description"
      content="Estúdio criativo. Ideias com personalidade, design com atitude."
    />
    <meta property="og:image" content="assets/img/thumb-bolachas/thumb-bolachas.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Estúdio Bolachas" />
    <meta
      name="twitter:description"
      content="Estúdio criativo. Ideias com personalidade, design com atitude."
    />
    <meta name="twitter:image" content="assets/img/thumb-bolachas/thumb-bolachas.jpg" />

    <!-- CSS do site (radial) -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- CSS da abertura (overlay) -->
    <link rel="stylesheet" href="css/entry.css" />
  </head>

  <body>
    <!-- Camada de ruído por cima do fundo vermelho -->
    <div class="grain" aria-hidden="true"></div>

    <!-- =========================
         SITE (MENU RADIAL)
         ========================= -->

    <nav class="radial" aria-label="Menu giratório">
      <ul class="radial__list" id="radialList" role="list">
        <li class="radial__item" data-key="manifesto">Manifesto</li>
        <li class="radial__item" data-key="links">Links</li>
        <li class="radial__item" data-key="servicos">Serviços</li>
        <li class="radial__item" data-key="contato">Contato</li>
      </ul>

      <div class="radial__dots" id="radialDots" aria-label="Indicador do menu">
        <span class="dot" data-dot="0" aria-hidden="true"></span>
        <span class="dot" data-dot="1" aria-hidden="true"></span>
        <span class="dot" data-dot="2" aria-hidden="true"></span>
        <span class="dot" data-dot="3" aria-hidden="true"></span>
      </div>
    </nav>

    <div class="bolachasHeader" aria-hidden="true"></div>

    <div class="gfxBand" aria-hidden="true">
      <div class="gfxBand__txt" aria-hidden="true"></div>
      <div class="gfxBand__barcode" aria-hidden="true"></div>
    </div>

    <div class="contentTitle" id="contentTitle" aria-hidden="true"></div>
    <div class="bolachinhaLogo" aria-hidden="true"></div>

    <div class="contentBackdrop" id="contentBackdrop" aria-hidden="true"></div>

    <aside class="contentPanel" id="contentPanel" aria-hidden="true">
      <div class="contentPanel__inner">
        <div class="contentPanel__body" id="contentPanelBody">
          <p class="contentPanel__placeholder">Conteúdo da seção (em breve).</p>
        </div>

        <button class="contentPanel__back" id="contentBack" type="button">← VOLTAR</button>
      </div>
    </aside>

    <template id="tpl-manifesto">
      <section class="panelSection panelSection--manifesto">
        <p class="manifestoP">
          O <span class="manifestoHighlightA">Estúdio Bolachas</span> é um grupo criativo que
          inspira e apoia projetos que vão além do arroz com feijão tradicional.
        </p>

        <p class="manifestoP">
          Nascemos da necessidade criativa como meio de sobrevivência e visão de mundo. É daí que
          vêm ideias preparadas com cuidado,
          <span class="manifestoHighlightB">para além de embalagens bonitas</span>.
        </p>

        <p class="manifestoP">
          Acreditamos no desenvolvimento criativo de forma
          <span class="manifestoHighlightB">desenrolada e honesta</span>, com o objetivo de impactar
          positivamente o contexto em que nossas ideias são servidas.
        </p>

        <p class="manifestoP">
          Nosso foco é
          <span class="manifestoHighlightB">descomplicar a criação</span>
          de ferramentas e processos que dão suporte à comunicação dos nossos clientes de forma
          efetiva, sempre no ponto certo.
        </p>

        <p class="manifestoP">
          Sem marmotagem:
          <span class="manifestoHighlightB">
            o trampo é bem feito, com qualidade e sabor original </span
          >.
        </p>

        <img src="assets/svg/manifesto-selo.svg" class="manifestoSelo" alt="Selo Manifesto" />
      </section>
    </template>

    <template id="tpl-contato">
      <section class="panelSection panelSection--lojinha">
        <p class="panelLead">A lojinha tá em construção.</p>
        <p class="panelSmall">Em breve: prints, adesivos, bugigangas e edições limitadas.</p>
      </section>
    </template>

    <template id="tpl-servicos">
      <section class="panelSection panelSection--servicos">
        <p class="panelLead">Serviços (rascunho)</p>
        <ul class="panelBullets">
          <li>identidade visual</li>
          <li>direção de arte</li>
          <li>design gráfico</li>
          <li>conteúdo / social</li>
          <li>sites e landing pages</li>
        </ul>
      </section>
    </template>

    <template id="tpl-links">
      <section class="panelSection panelSection--links">
        <p class="panelLead">Links rápidos</p>
        <ul class="panelBullets">
          <li>Instagram (em breve)</li>
          <li>WhatsApp (em breve)</li>
          <li>Loja (em breve)</li>
        </ul>
      </section>
    </template>

    <!-- =========================
         ABERTURA (OVERLAY)
         ========================= -->
    <div class="entryOverlay" id="entryOverlay" aria-label="Abertura do site">
      <div class="entryBg" aria-hidden="true"></div>

      <div class="content-box top-box" aria-hidden="true">
        <img class="bg-top-svg" src="assets/img/bg-top-box.png" alt="" />
        <img class="selo-nova" src="assets/svg/selo-nova.svg" alt="" />
        <img class="selo-aviso" src="assets/svg/selo-aviso.svg" alt="" />
        <img class="selo-puxe" src="assets/svg/selo-puxe.svg" alt="Puxe o lacre para abrir" />
      </div>

      <div class="content-box bottom-box" aria-hidden="true">
        <img class="bg-bottom-svg" src="assets/img/bg-bottom-box.png" alt="" />
        <div class="rodape-bottom-box" aria-hidden="true"></div>

        <a class="entry-bolachinha" href="#" aria-label="Bolachinha"></a>
        <img class="entry-ingredientes" src="assets/svg/txt-ingredientes.svg" alt="Ingredientes" />
      </div>

      <div class="linha-vermelha" aria-hidden="true"></div>
      <img class="gotinha" src="assets/svg/gotinha.svg" alt="gotinha" />
    </div>

    <!-- JS do site (radial) -->
    <script src="js/app.js"></script>
    <!-- JS da abertura (revela o site) -->
    <script src="js/interaction.js"></script>
  </body>
</html>
