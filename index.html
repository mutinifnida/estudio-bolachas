  <body>
    <h1 class="sr-only">
      Estúdio Bolachas — estúdio criativo de design, identidade visual, comunicação e projetos
      digitais
    </h1>

    <!-- ========================================
         CAMADA GLOBAL DE FUNDO
         ======================================== -->
    <div class="grain" aria-hidden="true"></div>

    <!-- ========================================
         ESTRUTURA PRINCIPAL DO SITE
         ======================================== -->
    <main class="siteShell" id="siteShell">
      <!-- MENU RADIAL -->
      <nav class="radial" aria-label="Menu giratório">
        <ul class="radial__list" id="radialList" role="list">
          <li class="radial__item" data-key="manifesto">Manifesto</li>
          <li class="radial__item" data-key="links">Links</li>
          <li class="radial__item" data-key="servicos">Serviços</li>
          <li class="radial__item" data-key="contato">Contato</li>
        </ul>

        <div class="radial__dots" id="radialDots" aria-label="Indicador do menu">
          <span class="dot" data-dot="0" aria-hidden="true"></span>
          <span class="dot" data-dot="1" aria-hidden="true"></span>
          <span class="dot" data-dot="2" aria-hidden="true"></span>
          <span class="dot" data-dot="3" aria-hidden="true"></span>
        </div>
      </nav>

      <!-- ELEMENTOS FIXOS DA HOME / CONTEÚDO -->
      <div class="bolachasHeader" aria-hidden="true"></div>

      <div class="gfxBand" aria-hidden="true">
        <div class="gfxBand__txt" aria-hidden="true"></div>
        <div class="gfxBand__barcode" aria-hidden="true"></div>
      </div>

      <div class="contentTitle" id="contentTitle" aria-hidden="true"></div>
      <div class="bolachinhaLogo" aria-hidden="true"></div>

      <!-- BACKDROP E PAINEL DE CONTEÚDO -->
      <div class="contentBackdrop" id="contentBackdrop" aria-hidden="true"></div>

      <aside class="contentPanel" id="contentPanel" aria-hidden="true">
        <div class="contentPanel__inner">
          <div class="contentPanel__body" id="contentPanelBody">
            <p class="contentPanel__placeholder">Conteúdo da seção (em breve).</p>
          </div>

          <button class="contentPanel__back" id="contentBack" type="button">← VOLTAR</button>
        </div>
      </aside>
    </main>

    <!-- ========================================
         TEMPLATES DE CONTEÚDO
         ======================================== -->

    <!-- MANIFESTO -->
    <template id="tpl-manifesto">
      <section class="panelSection panelSection--manifesto">
        <p class="manifestoP">
          O <span class="manifestoHighlightA">Estúdio Bolachas</span> é um grupo criativo que
          inspira e apoia projetos que vão além do arroz com feijão tradicional.
        </p>

        <p class="manifestoP">
          Nascemos da necessidade criativa como meio de sobrevivência e visão de mundo. É daí que
          vêm ideias preparadas com cuidado,
          <span class="manifestoHighlightB">para além de embalagens bonitas</span>.
        </p>

        <p class="manifestoP">
          Acreditamos no desenvolvimento criativo de forma
          <span class="manifestoHighlightB">desenrolada e honesta</span>, com o objetivo de impactar
          positivamente o contexto em que nossas ideias são servidas.
        </p>

        <p class="manifestoP">
          Nosso foco é
          <span class="manifestoHighlightB">descomplicar a criação</span>
          de ferramentas e processos que dão suporte à comunicação dos nossos clientes de forma
          efetiva, sempre no ponto certo.
        </p>

        <p class="manifestoP">
          Sem marmotagem:
          <span class="manifestoHighlightB">
            o trampo é bem feito, com qualidade e sabor original </span
          >.
        </p>

        <img src="assets/svg/manifesto-selo.svg" class="manifestoSelo" alt="Selo Manifesto" />
      </section>
    </template>

    <!-- CONTATO -->
    <template id="tpl-contato">
      <section class="panelSection panelSection--contato">
        <h3 class="ctTitle">Conte a sua ideia para a gente!</h3>

        <p class="ctIntro">Use o formulário abaixo ou dê um “alô” nas nossas redes sociais.</p>

        <div class="ctFormBox">
          <form class="ctForm" action="#" method="post">
            <label class="ctField">
              <span class="ctIcon ctIcon--user" aria-hidden="true"></span>
              <input class="ctInput" type="text" name="nome" placeholder="Nome*" required />
            </label>

            <label class="ctField">
              <span class="ctIcon ctIcon--mail" aria-hidden="true"></span>
              <input class="ctInput" type="email" name="email" placeholder="Email*" required />
            </label>

            <label class="ctField">
              <span class="ctIcon ctIcon--phone" aria-hidden="true"></span>
              <input class="ctInput" type="tel" name="telefone" placeholder="Telefone (opcional)" />
            </label>

            <label class="ctField ctField--msg">
              <textarea
                class="ctInput ctTextarea"
                name="mensagem"
                placeholder="Conte um pouco sobre seu negócio, ideia ou necessidades atuais."
                rows="5"
              ></textarea>
            </label>

            <div class="ctLegend">* Campos obrigatórios</div>

            <button class="ctSend" type="submit">ENVIAR</button>
          </form>
        </div>

        <p class="ctInfo">
          Todas as informações compartilhadas são tratadas com discrição e respeito.
        </p>

        <a class="ctEmail" href="mailto:contato@estudiobolachas.com">
          contato@estudiobolachas.com
        </a>

        <div class="ctSocial" aria-label="Redes sociais">
          <a
            class="ctSocialBtn"
            href="https://www.instagram.com/estudiobolachas/"
            aria-label="Instagram"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="ctSocialIcon ctSocialIcon--insta" aria-hidden="true"></span>
          </a>

          <a
            class="ctSocialBtn"
            href="https://www.behance.net/estudiobolachas"
            aria-label="Behance"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="ctSocialIcon ctSocialIcon--behance" aria-hidden="true"></span>
          </a>

          <a
            class="ctSocialBtn"
            href="https://www.linkedin.com/company/estudiobolachas/"
            aria-label="LinkedIn"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="ctSocialIcon ctSocialIcon--linkedin" aria-hidden="true"></span>
          </a>

          <a
            class="ctSocialBtn"
            href="https://wa.me/5513996456249?text=Olá,%20como%20vai?%20Quero%20falar%20sobre%20um%20projeto."
            aria-label="WhatsApp"
            rel="noopener noreferrer"
          >
            <span class="ctSocialIcon ctSocialIcon--whats" aria-hidden="true"></span>
          </a>
        </div>
      </section>
    </template>

    <!-- SERVIÇOS -->
    <template id="tpl-servicos">
      <section class="panelSection panelSection--servicos">
        <div class="svcBlock">
          <div class="svcHead">
            <div class="svcBullet">*</div>
            <div class="svcTitle">Web Design</div>
          </div>
          <div class="svcDesc">
            Sites preparados com criatividade refinada e prontos para converter. Tudo responsivo e
            caramelizado com design que chama atenção.
          </div>
        </div>

        <div class="svcBlock">
          <div class="svcHead">
            <div class="svcBullet">*</div>
            <div class="svcTitle">Planejamento</div>
          </div>
          <div class="svcDesc">
            Anúncios com alto teor de resultado. Seu trampo foca no que importa, enquanto o sistema
            prepara os leads automaticamente.
          </div>
        </div>

        <div class="svcBlock">
          <div class="svcHead">
            <div class="svcBullet">*</div>
            <div class="svcTitle">Identidade Visual</div>
          </div>
          <div class="svcDesc">
            Identidade com recheio. Da criação ou fortalecimento da marca às redes sociais, a gente
            entrega o pacote completo para sua marca virar referência.
          </div>
        </div>

        <div class="svcBlock">
          <div class="svcHead">
            <div class="svcBullet">*</div>
            <div class="svcTitle">Produtos &amp; Campanhas</div>
          </div>
          <div class="svcDesc">
            Do rascunho à prateleira, preparamos produtos e campanhas com sabor estratégico. Tudo
            pronto para impactar, engajar e fazer sua marca faturar.
          </div>
        </div>

        <a
          class="svcCta"
          href="https://wa.me/5513996456249?text=Olá,%20como%20vai?%20Quero%20falar%20sobre%20um%20projeto."
          rel="noopener noreferrer"
        >
          <span class="svcCta__label">FALE COM A GENTE</span>
          <span class="svcCta__icon" aria-hidden="true"></span>
        </a>
      </section>
    </template>

    <!-- LINKS -->
    <template id="tpl-links">
      <section class="panelSection panelSection--links">
        <a
          class="linksBtn"
          href="https://www.instagram.com/estudiobolachas/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <div class="linksBtn__title">NOVIDADES</div>
          <div class="linksBtn__desc">
            Acompanhe nossos projetos recentes no Instagram.
            <span class="linksBtn__hl">@estudiobolachas</span>
          </div>
        </a>

        <a
          class="linksBtn"
          href="https://www.behance.net/estudiobolachas"
          target="_blank"
          rel="noopener noreferrer"
        >
          <div class="linksBtn__title">PROJETOS</div>
          <div class="linksBtn__desc">
            Veja nossos processos criativos no Behance.
            <span class="linksBtn__hl">@estudiobolachas</span>
          </div>
        </a>

        <a
          class="linksBtn"
          href="https://www.instagram.com/galeriabolachas/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <div class="linksBtn__title">GALERIA</div>
          <div class="linksBtn__desc">
            Conheça produtos originais com a nossa curadoria
            <span class="linksBtn__hl">@galeriabolachas</span>
          </div>
        </a>
      </section>
    </template>

      <div class="content-box bottom-box" aria-hidden="true">

        <a class="entry-bolachinha" href="#" aria-label="Bolachinha"></a>

      <img class="gotinha" src="assets/svg/gotinha.svg" alt="Gotinha do lacre" />
